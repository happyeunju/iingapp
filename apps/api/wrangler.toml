name = "iingapp-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENV = "production"
# Secrets (JWT_SECRET, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY) are set via
# `wrangler secret put <NAME>` — encrypted, not stored in this file.
# For local `wrangler dev`, use apps/api/.dev.vars (gitignored).
